name: Android Debug CI

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build:
    name: Build App Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build with Gradle
        run: ./gradlew assembleDebug 

      - name: List repo contents
        run: ls
          
      - name: Get the last commit message
        id: get_commit_msg
        run: |
          commit_message=$(git log -1 --pretty=format:'%s')
          echo "message=$commit_message" >> $GITHUB_OUTPUT

      - name: Rename file 
        run: |
          mv app-release.apk sparkles-app-release.apk
          mv app-debug.apk sparkles-app-debug.apk
          ls
          
      - name: Upload debug apk
        uses: actions/upload-artifact@v4
        with:
          name: sparkles-app-debug
          path: sparkles-app-debug.apk
          name: sparkles-app-release
          path: sparkles-app-release.apk
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
